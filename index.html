<!DOCTYPE html>
<html lang="fa" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Defense</title>
    <style>
        /* جلوگیری از انتخاب متن و کپی شدن ناخواسته */
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            background: linear-gradient(45deg, #ff007f, #00d2ff, #7f00ff); 
            background-size: 300% 300%; animation: gradientBG 8s ease infinite; 
            color: white; font-family: Tahoma, sans-serif; min-height: 100vh; 
            overflow: hidden; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        :root { --bg-color: rgba(0,0,0,0.85); --text-color: white; }
        .theme-dark { --bg-color: rgba(0,0,0,0.9); --text-color: #fff; }
        .theme-light { --bg-color: rgba(255,255,255,0.9); --text-color: #000; }
        .theme-neon { --bg-color: rgba(255, 0, 255, 0.4); --text-color: #0ff; }
        
        .info-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background-color: rgba(0, 0, 0, 0.4); box-sizing: border-box; }
        .game-container { position: relative; margin-top: 20px; }
        #gameCanvas { background: rgba(0, 0, 0, 0.5); border: 2px solid #fff; border-radius: 10px; display: block; }
        
        .menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: 10px; }
        .hidden { display: none; }
        .btn { padding: 8px 12px; margin: 5px; border: 1px solid currentColor; border-radius: 8px; cursor: pointer; background: transparent; color: inherit; font-size: 14px; }
        .controls { display: flex; gap: 20px; margin-top: 20px; }
        .ctrl-btn { padding: 15px 25px; background: rgba(255, 255, 255, 0.2); border: 2px solid white; border-radius: 12px; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div class="info-bar">
        <span onclick="toggleMenu('settingsMenu')" style="cursor:pointer">⚙️</span>
        <span id="brand">bdfgame@</span>
        <span id="scoreDisplay">امتیاز: 0</span>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div id="mainMenu" class="menu-overlay">
            <h2 id="msg">دفاع فضایی</h2>
            <button class="btn" onclick="startGame()" id="startBtn">شروع بازی</button>
        </div>
        <div id="settingsMenu" class="menu-overlay hidden">
            <h3 id="setTxt">تنظیمات</h3>
            <div>
                <button class="btn" onclick="setLang('fa')">فارسی</button>
                <button class="btn" onclick="setLang('ar')">العربية</button>
                <button class="btn" onclick="setLang('en')">English</button>
            </div>
            <div style="margin-top:10px">
                <button class="btn" onclick="setTheme('theme-dark')">Dark</button>
                <button class="btn" onclick="setTheme('theme-neon')">Neon</button>
            </div>
            <button class="btn" onclick="toggleMenu('settingsMenu')">بازگشت</button>
        </div>
    </div>

    <div class="controls">
        <div class="ctrl-btn" id="leftBtn">◀️</div>
        <div class="ctrl-btn" id="shootBtn">🚀</div>
        <div class="ctrl-btn" id="rightBtn">▶️</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
        let playerX = 130, score = 0, isRunning = false, currentLang = 'fa';
        let enemies = [], bullets = [], keys = {l: false, r: false};

        window.addEventListener("keydown", (e) => {
            if(e.key === "ArrowLeft") keys.l = true;
            if(e.key === "ArrowRight") keys.r = true;
            if(e.key === " " && isRunning) bullets.push({x: playerX + 17, y: 270});
        });
        window.addEventListener("keyup", (e) => {
            if(e.key === "ArrowLeft") keys.l = false;
            if(e.key === "ArrowRight") keys.r = false;
        });

        const trans = {
            fa: { title: "دفاع فضایی", score: "امتیاز", start: "شروع بازی", settings: "تنظیمات" },
            ar: { title: "الدفاع الفضائي", score: "النقاط", start: "بدء اللعبة", settings: "الإعدادات" },
            en: { title: "Space Defense", score: "Score", start: "Start Game", settings: "Settings" }
        };

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('msg').innerText = trans[lang].title;
            document.getElementById('startBtn').innerText = trans[lang].start;
            document.getElementById('setTxt').innerText = trans[lang].settings;
            document.getElementById('scoreDisplay').innerText = trans[lang].score + ": " + score;
            document.getElementById('htmlTag').dir = (lang === 'en') ? 'ltr' : 'rtl';
        }

        function setTheme(c) { document.getElementById('settingsMenu').className = 'menu-overlay ' + c; }
        function toggleMenu(id) { document.getElementById(id).classList.toggle('hidden'); }

        document.getElementById("leftBtn").onpointerdown = () => keys.l = true;
        document.getElementById("leftBtn").onpointerup = () => keys.l = false;
        document.getElementById("rightBtn").onpointerdown = () => keys.r = true;
        document.getElementById("rightBtn").onpointerup = () => keys.r = false;
        document.getElementById("shootBtn").onclick = () => { if(isRunning) bullets.push({x: playerX + 17, y: 270}); };

        function startGame() {
            score = 0; enemies = []; bullets = []; isRunning = true;
            document.getElementById("mainMenu").classList.add("hidden");
            loop();
        }

        function loop() {
            if (!isRunning) return;
            if (keys.l && playerX > 0) playerX -= 6;
            if (keys.r && playerX < 260) playerX += 6;

            if(Math.random() < 0.02) enemies.push({x: Math.random()*270, y: 0});

            ctx.clearRect(0, 0, 300, 300);
            enemies.forEach((e, i) => {
                e.y += 1.5;
                ctx.fillStyle = "red"; ctx.fillRect(e.x, e.y, 20, 20);
                if (e.y > 270 && e.x < playerX + 40 && e.x + 20 > playerX) {
                    isRunning = false; document.getElementById("mainMenu").classList.remove("hidden");
                }
                if(e.y > 300) enemies.splice(i, 1);
            });

            bullets.forEach((b, i) => {
                b.y -= 7;
                ctx.fillStyle = "yellow"; ctx.fillRect(b.x, b.y, 5, 10);
                enemies.forEach((e, ei) => {
                    if (b.y < e.y + 20 && b.x > e.x && b.x < e.x + 20) {
                        score += 10; document.getElementById('scoreDisplay').innerText = trans[currentLang].score + ": " + score;
                        enemies.splice(ei, 1); bullets.splice(i, 1);
                    }
                });
                if(b.y < 0) bullets.splice(i, 1);
            });

            ctx.fillStyle = "#00d2ff"; ctx.fillRect(playerX, 280, 40, 10);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
